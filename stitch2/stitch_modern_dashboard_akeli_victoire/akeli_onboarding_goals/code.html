<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl bg-surface-container-low/40 dark:bg-surface-container-high/40">
<div class="flex justify-between items-center px-6 py-4 max-w-screen-xl mx-auto">
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity p-2 rounded-full hover:bg-surface-container-high/50 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-2xl font-bold tracking-tight text-primary dark:text-primary-fixed-dim">Akeli</h1>
<button class="text-primary dark:text-primary-fixed-dim font-headline font-semibold tracking-tight hover:opacity-80 transition-opacity">
                Help
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-screen-md mx-auto w-full flex flex-col gap-8">
<!-- Progress Indicator -->
<div class="w-full space-y-2">
<div class="flex justify-between items-end font-label text-xs uppercase tracking-widest text-on-surface-variant">
<span>Étape 4 sur 6</span>
<span class="text-primary font-semibold">Vos objectifs</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden flex">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-4/6 rounded-full"></div>
</div>
</div>
<!-- Header -->
<div class="space-y-4">
<h2 class="font-headline text-[2.5rem] leading-tight font-bold tracking-tight text-on-surface">Vos objectifs</h2>
<p class="font-body text-base text-on-surface-variant leading-relaxed max-w-lg">
                Définissons ensemble ce que vous souhaitez accomplir. Ces informations nous permettront d'ajuster votre programme.
            </p>
</div>
<!-- Central Card -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-8 shadow-[0_24px_48px_rgba(27,28,22,0.06)] flex flex-col gap-10">
<!-- Target Weight Input -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block" for="target-weight">Poids cible (kg)</label>
<div class="relative">
<input class="w-full bg-surface-container-highest rounded-sm border-0 py-4 px-4 font-body text-lg text-on-surface focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-colors transition-shadow placeholder-on-surface-variant/50" id="target-weight" placeholder="Ex: 65" type="number" value="70"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
<span class="font-label text-sm text-on-surface-variant">kg</span>
</div>
</div>
</div>
<!-- Timeline Slider -->
<div class="space-y-6">
<div class="flex justify-between items-center">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Délai estimé</label>
<div class="bg-tertiary-fixed text-on-tertiary-fixed rounded-full px-3 py-1 font-label text-[10px] uppercase tracking-widest flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        Modéré
                    </div>
</div>
<div class="flex flex-col items-center gap-4">
<div class="font-headline text-[3.5rem] font-bold tracking-tight text-primary leading-none">
                        6 <span class="text-xl text-on-surface-variant font-medium">mois</span>
</div>
<div class="w-full relative py-4">
<!-- Custom Slider Track -->
<div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary-container w-1/2 rounded-full"></div>
</div>
<!-- Custom Slider Thumb -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-surface-container-lowest rounded-full shadow-[0_4px_12px_rgba(27,28,22,0.12)] border-2 border-primary cursor-pointer flex items-center justify-center">
<div class="w-2 h-2 bg-primary rounded-full"></div>
</div>
</div>
<div class="w-full flex justify-between font-label text-[10px] text-on-surface-variant uppercase tracking-widest">
<span>1 mois</span>
<span>12 mois</span>
</div>
</div>
</div>
<!-- Motivations Textarea -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block" for="motivations">Vos motivations</label>
<textarea class="w-full bg-surface-container-highest rounded-sm border-0 py-4 px-4 font-body text-base text-on-surface focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-colors transition-shadow resize-none placeholder-on-surface-variant/50" id="motivations" placeholder="Pourquoi souhaitez-vous atteindre cet objectif ?" rows="4"></textarea>
</div>
</div>
</main>
<!-- Bottom Action Bar (Contextual for linear flow, overriding global nav due to task focus) -->
<div class="fixed bottom-0 w-full z-40 bg-surface/90 backdrop-blur-xl border-t border-surface-container-highest">
<div class="max-w-screen-md mx-auto px-6 py-4 flex justify-between items-center gap-4">
<button class="px-6 py-4 rounded-DEFAULT font-headline font-semibold text-primary bg-secondary-container hover:bg-secondary-container/80 transition-colors">
                Précédent
            </button>
<button class="px-8 py-4 rounded-DEFAULT font-headline font-semibold text-on-primary bg-gradient-to-br from-primary to-primary-container hover:opacity-90 transition-opacity shadow-[0_8px_16px_rgba(0,106,99,0.2)]">
                Suivant
            </button>
</div>
</div>
