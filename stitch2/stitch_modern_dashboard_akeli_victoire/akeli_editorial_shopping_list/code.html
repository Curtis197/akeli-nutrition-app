<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface flex flex-col min-h-screen relative pb-28 md:pb-0">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-40 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:bg-secondary-container/50 dark:hover:bg-on-secondary-fixed-variant/20 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-on-surface dark:text-on-surface-variant text-headline-md tracking-tight">Ma Liste</h1>
<button class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:bg-secondary-container/50 dark:hover:bg-on-secondary-fixed-variant/20 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<div class="px-6 pt-2 pb-6 flex-grow flex flex-col gap-8">
<!-- Filters (Segmented Chips) -->
<div class="flex gap-2 w-full justify-between bg-surface-container-low p-2 rounded-lg mt-4">
<button class="flex-1 py-2 rounded-lg bg-primary-container text-on-primary-container font-headline font-semibold text-sm shadow-[0_4px_12px_rgba(0,106,99,0.1)] transition-all">Tous</button>
<button class="flex-1 py-2 rounded-lg text-on-surface-variant font-headline font-medium text-sm hover:bg-surface-container-highest transition-all">Achetés</button>
<button class="flex-1 py-2 rounded-lg text-on-surface-variant font-headline font-medium text-sm hover:bg-surface-container-highest transition-all">Restants</button>
</div>
<!-- Count Banner -->
<div class="flex flex-col items-center justify-center py-8">
<span class="font-display text-6xl font-extrabold text-primary tracking-tighter">66</span>
<span class="font-label text-label-md tracking-wider uppercase text-on-surface-variant mt-2">ingrédients total</span>
</div>
<!-- Ingredient List -->
<div class="flex flex-col gap-2">
<!-- Unchecked Item -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg shadow-[0px_4px_12px_rgba(27,28,22,0.02)]">
<div class="flex items-center gap-4">
<button class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></button>
<span class="font-body text-body-lg text-on-surface font-medium">Apki</span>
</div>
<span class="font-label text-on-surface-variant bg-surface-container px-3 py-1 rounded-full text-xs font-semibold">20 g</span>
</div>
<!-- Unchecked Item -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg shadow-[0px_4px_12px_rgba(27,28,22,0.02)]">
<div class="flex items-center gap-4">
<button class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></button>
<span class="font-body text-body-lg text-on-surface font-medium">Atiéké</span>
</div>
<span class="font-label text-on-surface-variant bg-surface-container px-3 py-1 rounded-full text-xs font-semibold">175 g</span>
</div>
<!-- Unchecked Item -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg shadow-[0px_4px_12px_rgba(27,28,22,0.02)]">
<div class="flex items-center gap-4">
<button class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></button>
<span class="font-body text-body-lg text-on-surface font-medium">Aubergine africaine</span>
</div>
<span class="font-label text-on-surface-variant bg-surface-container px-3 py-1 rounded-full text-xs font-semibold">150 Gramme</span>
</div>
<!-- Checked Item -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-lg opacity-60">
<div class="flex items-center gap-4">
<button class="w-6 h-6 rounded-full bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<span class="font-body text-body-lg text-on-surface-variant line-through">Banane plantain mûre (jaune)</span>
</div>
<span class="font-label text-on-surface-variant bg-surface-variant px-3 py-1 rounded-full text-xs font-semibold line-through">80 g</span>
</div>
<!-- Unchecked Item -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg shadow-[0px_4px_12px_rgba(27,28,22,0.02)]">

</div>
<span class="font-label text-on-surface-variant bg-surface-container px-3 py-1 rounded-full text-xs font-semibold">1.5 g</span>
</div>
</div>
