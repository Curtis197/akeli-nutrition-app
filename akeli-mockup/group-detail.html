<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akeli — Groupe Détail</title>
<link rel="stylesheet" href="shared-design-system.css">
<style>
  /* Group banner */
  .group-banner {
    width: 100%;
    height: 200px;
    background: #e8e0d0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .group-banner-silhouettes {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: -10px;
    width: 100%; height: 100%;
    padding-bottom: 10px;
  }
  /* Three overlapping silhouette avatars */
  .sil {
    border-radius: 50%;
    background: #c8c0b0;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sil svg { opacity: 0.6; }

  .group-banner-name {
    position: absolute;
    top: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 20px; font-weight: 800;
    color: #555;
  }

  /* Section labels */
  .section-label {
    font-size: 17px; font-weight: 900;
    color: var(--black); text-align: center;
    margin-bottom: 10px;
  }

  /* Participant row */
  .participant-row {
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    display: flex; align-items: center;
    gap: 12px; margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
  }
  .participant-info { flex: 1; }
  .participant-name { font-size: 14px; font-weight: 700; color: var(--dark); }
  .participant-role { font-size: 12px; font-weight: 600; color: var(--grey); }

  .btn-ecrire {
    border: 1.5px solid var(--green);
    border-radius: var(--radius-pill);
    padding: 7px 14px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; color: var(--green);
    cursor: pointer; background: transparent; white-space: nowrap;
  }
  .btn-ecrire svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="phone-shell" style="background: var(--cream);">
  <div class="notch"></div>
  <div class="status-bar white" style="background: var(--cream);">
    <span class="status-time">11:00</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="16" width="3" height="7" rx="1"/><rect x="6" y="11" width="3" height="12" rx="1"/><rect x="11" y="6" width="3" height="17" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1.5" fill="currentColor" stroke="none"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="18" height="10" rx="2"/><rect x="3" y="8" width="13" height="8" rx="1" fill="currentColor" stroke="none"/></svg>
    </div>
  </div>

  <!-- Back button green circle -->
  <div style="padding: 10px 16px 0; flex-shrink: 0; background: var(--cream);">
    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="18" height="18"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
  </div>

  <!-- Group banner -->
  <div class="group-banner">
    <div class="group-banner-name">melun sport</div>
    <!-- Three silhouettes: left small, center large, right small -->
    <div style="display: flex; align-items: flex-end; justify-content: center; width: 100%; height: 100%; padding-bottom: 0; position: relative;">
      <!-- Left silhouette -->
      <div style="position: absolute; bottom: 10px; left: 60px;">
        <div class="sil" style="width: 70px; height: 70px;">
          <svg viewBox="0 0 24 24" fill="#aaa" width="40" height="40"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
        </div>
      </div>
      <!-- Center silhouette (largest) -->
      <div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);">
        <div class="sil" style="width: 110px; height: 110px;">
          <svg viewBox="0 0 24 24" fill="#999" width="66" height="66"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
        </div>
      </div>
      <!-- Right silhouette -->
      <div style="position: absolute; bottom: 10px; right: 60px;">
        <div class="sil" style="width: 70px; height: 70px;">
          <svg viewBox="0 0 24 24" fill="#aaa" width="40" height="40"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="scroll-content padded" style="background: var(--cream); padding-top: 20px;">

    <!-- Description -->
    <div class="section-label">Description</div>
    <p style="font-size: 13px; font-weight: 600; color: var(--grey); text-align: center; margin-bottom: 28px; line-height: 1.6;">
      Groupe de discussion situé a Melun tout le monde est le bienvenue
    </p>

    <!-- Participants -->
    <div class="section-label">Participant</div>

    <div class="participant-row">
      <div class="avatar" style="width: 42px; height: 42px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
      </div>
      <div class="participant-info">
        <div class="participant-name">Curtis</div>
        <div class="participant-role">Admin</div>
      </div>
      <button class="btn-ecrire">
        Ecrire
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div class="participant-row">
      <div class="avatar" style="width: 42px; height: 42px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
      </div>
      <div class="participant-info">
        <div class="participant-name">Victoire</div>
      </div>
    </div>

    <!-- CTA -->
    <div style="text-align: center; margin-top: 20px;">
      <button class="btn btn-orange" style="width: 220px; padding: 16px; font-size: 15px;">
        Quitter le groupe
      </button>
    </div>

  </div>
</div>

</body>
</html>
