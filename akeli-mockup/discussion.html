<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akeli — Discussion</title>
<link rel="stylesheet" href="shared-design-system.css">
<style>
  /* Conversation list row */
  .convo-row {
    display: flex; align-items: center;
    gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--grey-light);
    cursor: pointer;
  }
  .convo-info { flex: 1; }
  .convo-name { font-size: 14px; font-weight: 800; color: var(--black); margin-bottom: 2px; }
  .convo-preview { font-size: 12px; font-weight: 600; color: var(--grey); }
  .convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .convo-time { font-size: 11px; font-weight: 600; color: var(--grey); }
  .convo-chevron { color: var(--dark); font-size: 16px; }

  /* Group list row */
  .group-row {
    display: flex; align-items: center;
    gap: 14px; padding: 16px 20px;
    border-bottom: 1px solid var(--grey-light);
    cursor: pointer;
  }
  .group-info { flex: 1; }
  .group-name { font-size: 14px; font-weight: 800; color: var(--black); margin-bottom: 2px; }
  .group-desc { font-size: 12px; font-weight: 600; color: var(--grey); line-height: 1.4; }

  /* Radio group inline */
  .radio-inline { display: flex; align-items: center; gap: 20px; padding: 12px 20px; }
  .radio-opt { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--dark); cursor: pointer; }
  .radio-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--grey); flex-shrink: 0; }
  .radio-circle.active { border-color: var(--green); background: radial-gradient(circle, var(--green) 50%, transparent 50%); }
</style>
</head>
<body>

<!-- ========== SCREEN 1: Conversation tab ========== -->
<div class="phone-shell" style="background: var(--white);">
  <div class="notch"></div>
  <div class="status-bar white">
    <span class="status-time">11:00</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="16" width="3" height="7" rx="1"/><rect x="6" y="11" width="3" height="12" rx="1"/><rect x="11" y="6" width="3" height="17" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1.5" fill="currentColor" stroke="none"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="18" height="10" rx="2"/><rect x="3" y="8" width="13" height="8" rx="1" fill="currentColor" stroke="none"/></svg>
    </div>
  </div>

  <!-- Title -->
  <div style="background: var(--white); text-align: center; padding: 10px 0 0; flex-shrink: 0; border-bottom: 1px solid var(--grey-light);">
    <div style="font-size: 22px; font-weight: 900; color: var(--green); padding-bottom: 0;">Discussion</div>
  </div>

  <!-- Tabs -->
  <div class="tabs" style="background: var(--white); padding: 0 20px; border-bottom: 1px solid #ddd;">
    <div class="tab active">Conversation</div>
    <div class="tab">Groupe</div>
  </div>

  <!-- Search -->
  <div style="padding: 12px 16px; flex-shrink: 0;">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Chercher une conversation" readonly>
    </div>
  </div>

  <!-- Conversation list -->
  <div class="scroll-content" style="padding: 0;">
    <a href="conversation.html" class="convo-row" style="text-decoration: none;">
      <div class="avatar" style="width: 46px; height: 46px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
      <div class="convo-info">
        <div class="convo-name">Curtis</div>
        <div class="convo-preview">test 20</div>
      </div>
      <div class="convo-meta">
        <div class="convo-time">il y a environ un mois</div>
        <div class="convo-chevron">›</div>
      </div>
    </a>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav cream">
    <a href="home.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="meal-planner.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></a>
    <a href="recette-liste+ordering+filtering.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></a>
    <a href="discussion.html" class="nav-item" style="text-decoration: none;">
      <svg class="nav-icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <div class="nav-dot"></div>
    </a>
  </div>
</div>

<!-- ========== SCREEN 2: Groupe tab ========== -->
<div class="phone-shell" style="background: var(--white);">

    </div>
  </div>

  <div style="background: var(--white); text-align: center; padding: 10px 0 0; flex-shrink: 0; border-bottom: 1px solid var(--grey-light);">
    <div style="font-size: 22px; font-weight: 900; color: var(--green); padding-bottom: 0;">Discussion</div>
  </div>

  <div class="tabs" style="background: var(--white); padding: 0 20px; border-bottom: 1px solid #ddd;">

      <div class="radio-circle"></div>

    </div>
  </div>

  <!-- CTA -->
  <div style="padding: 4px 16px 14px; flex-shrink: 0; text-align: center;">
    <button class="btn btn-green" style="width: 200px;">Créer un groupe</button>
  </div>

  <!-- Group list -->
  <div class="scroll-content" style="padding: 0;">
    <a href="group-chat.html" class="group-row" style="text-decoration: none;">
      <div class="avatar" style="width: 46px; height: 46px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="group-info">
        <div class="group-name">melun sport</div>
        <div class="group-desc">Groupe de discussion situé a Melun<br>tout le monde est le bienvenue</div>
      </div>
      <div style="font-size: 18px; color: var(--dark);">›</div>
    </a>
    <a href="group-chat.html" class="group-row" style="text-decoration: none;">
      <div class="avatar" style="width: 46px; height: 46px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="group-info">
        <div class="group-name">melun lebon</div>
        <div class="group-desc">c'est la vie</div>
      </div>
      <div style="font-size: 18px; color: var(--dark);">›</div>
    </a>
    <a href="group-chat.html" class="group-row" style="text-decoration: none;">
      <div class="avatar" style="width: 46px; height: 46px; flex-shrink: 0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="group-info">
        <div class="group-name">group name</div>
        <div class="group-desc">group description</div>
      </div>
      <div style="font-size: 18px; color: var(--dark);">›</div>
    </a>
  </div>

  <div class="bottom-nav cream">
    <a href="home.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="meal-planner.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></a>
    <a href="recette-liste+ordering+filtering.html" class="nav-item" style="text-decoration: none;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></a>
    <a href="discussion.html" class="nav-item" style="text-decoration: none;">
      <svg class="nav-icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <div class="nav-dot"></div>
    </a>
  </div>
</div>

</body>
</html>
