name: akeli
description: "Akeli V1 — Application de nutrition et recettes africaines"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — Riverpod par domaine fonctionnel
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation — GoRouter avec auth guards
  go_router: ^14.2.7

  # Fonts — Nunito
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # UI helpers
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3

  # Graphes nutrition
  fl_chart: ^0.68.0

  # Internationalisation
  intl: ^0.20.0


  # Tracking — visibility detection for recipe impression events
  visibility_detector: ^0.4.0

  # Utils
  timeago: ^3.6.1
  logger: ^2.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
