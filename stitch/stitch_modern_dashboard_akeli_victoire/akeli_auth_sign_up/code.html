<body class="bg-background min-h-screen flex flex-col font-body text-on-surface">
<!-- TopAppBar (Transactional - Hidden Navigation, Brand Only) -->
<header class="w-full flex flex-col items-center justify-center pt-12 pb-8">
<h1 class="font-headline font-bold text-[40px] tracking-[0.05em] text-primary">AKELI</h1>
<p class="font-body text-on-surface-variant text-base mt-2">Bienvenue sur Akeli</p>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pb-20">
<!-- Auth Card -->
<div class="bg-surface-container-lowest w-full max-w-md rounded-xl shadow-[0px_24px_48px_rgba(27,28,22,0.06)] p-6 md:p-8">
<!-- TabBar (Stateless rendering) -->
<div class="flex items-center space-x-2 mb-10 border-b-0">
<button class="flex-1 py-3 px-4 rounded-lg bg-primary-container/20 text-primary font-label font-medium text-sm transition-colors text-center">
                    S'inscrire
                </button>
<button class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant hover:bg-surface-container-low font-label font-medium text-sm transition-colors text-center">
                    Se connecter
                </button>
</div>
<!-- Sign Up Form Area -->
<div class="space-y-8">
<!-- Heading Group -->
<div class="text-center">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">Créer votre compte</h2>
<p class="font-body text-sm text-on-surface-variant">Rejoignez la communauté Akeli</p>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block font-label text-xs tracking-widest text-on-surface-variant uppercase mb-2 ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-0 rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow font-body" id="email" name="email" placeholder="Entrez votre email" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label text-xs tracking-widest text-on-surface-variant uppercase mb-2 ml-1" for="password">Mot de passe</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-0 rounded-DEFAULT py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow font-body" id="password" name="password" placeholder="Créez un mot de passe" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label text-xs tracking-widest text-on-surface-variant uppercase mb-2 ml-1" for="confirm-password">Confirmer le mot de passe</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-0 rounded-DEFAULT py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow font-body" id="confirm-password" name="confirm-password" placeholder="Confirmez le mot de passe" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 px-6 rounded-DEFAULT font-headline font-semibold text-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_8px_16px_rgba(0,106,99,0.2)] mt-8" type="submit">
                        Commencer
                    </button>
</form>
</div>
