<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Akeli - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

          theme: {

                      "on-secondary-fixed-variant": "#294d49",

                      "surface-container-high": "#eae8de",
                      "secondary-container": "#c3eae5",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 antialiased selection:bg-primary-container selection:text-on-primary-container">
<div class="w-full max-w-md mx-auto flex flex-col space-y-10">
<!-- Brand Header -->
<div class="text-center space-y-2">
<h1 class="font-headline font-bold text-[40px] tracking-[2px] text-primary">AKELI</h1>
<p class="font-body text-on-surface-variant text-sm">Bienvenue sur Akeli</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-8 shadow-[0_24px_48px_rgba(27,28,22,0.06)] flex flex-col space-y-8 relative overflow-hidden">
<!-- Subtle gradient texture top -->
<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-primary-container opacity-20"></div>
<!-- Tab Bar -->
<div class="flex justify-center space-x-2">
<button class="px-6 py-2 rounded-full font-label text-sm text-on-surface-variant hover:text-primary transition-colors">
                    S'inscrire
                </button>
<button class="px-6 py-2 rounded-full font-label text-sm bg-primary-container text-on-primary-container font-medium transition-colors">
                    Se connecter
                </button>
</div>
<!-- Content -->
<div class="space-y-8">
<!-- Heading -->
<div class="space-y-1 text-center">
<h2 class="font-headline font-bold text-2xl text-on-surface">Heureux de vous revoir !</h2>
<p class="font-body text-on-surface-variant text-sm">Connectez-vous à votre compte</p>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container-low border-0 rounded-[16px] py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow font-body" placeholder="Email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface-container-low border-0 rounded-[16px] py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow font-body" placeholder="Mot de passe" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="space-y-4 pt-2">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-semibold rounded-[16px] py-4 hover:opacity-90 transition-opacity active:scale-[0.98] duration-200" type="submit">
                            Se connecter
                        </button>
<div class="text-center">
<button class="font-label text-sm text-primary hover:text-primary-container transition-colors" type="button">
                                Mot de passe oublié ?
                            </button>
</div>
</div>
</form>
</div>
</div>
</div>
</body></html>
